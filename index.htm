<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>RuTube.ru :: Всё видео!</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>
    <div id="wrapper">
        <!-- Шапка в стиле 2000-х -->
        <header>
    <div class="logo-container">
        <a href="/">
            <img src="rutube.png" alt="RuTube" class="logo">
        </a>
        <span class="slogan">Всё видео!</span>
    </div>
    
    <nav class="top-menu">
        <a href="#video">Видео</a> | 
        <a href="#community">Сообщества</a> | 
        <a href="#shows">Передачи</a> | 
        <a href="#login">Вход</a>
    </nav>
    
    <div class="search-bar">
        <input type="text" placeholder="Найти видео...">
        <button type="submit">Найти!</button>
    </div>
</header>



       <main>
    <!-- Сетка видео в стиле 2007-го -->
    <div style="padding: 20px; display: flex; flex-wrap: wrap;">
        
        <!-- Одно видео (Карточка) -->
        <div style="width: 180px; margin-right: 20px; text-align: left;">
            <a href="videoplayback.htm" style="text-decoration: none;">
                <!-- Заглушка под превью -->
                <div style="width: 160px; height: 120px; background: #000; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold;">
                    <img src="video1.png" style="width: 80px; opacity: 0.5;" alt="Превью">
                </div>
                <!-- Название видео -->
                <p style="color: #0033cc; font-weight: bold; font-size: 13px; margin-top: 5px; text-decoration: underline;">
                    videoplayback.mp4
                </p>
            </a>
            <span style="color: #666; font-size: 11px;">Просмотров: 124 502</span>
        </div>

    </div>
</main>


            <aside class="sidebar">
                <h3>Похожие видео</h3>
                <div class="thumb">
                    <img src="thumb1.jpg">
                    <p>Приколы с котами 2007</p>
                </div>
            </aside>
        </main>

        <footer>
            <p>&copy; 2006-2009 RuTube. Передаем привет эпохе Flash!</p>
        </footer>
    </div>
<!-- Твой HTML код выше (шапка, логотип, плеер) -->

    <script>
        // 1. Находим элементы (кнопки и полоску), которые ты сделал в HTML
        const playBtn = document.querySelector('.btn'); // Твоя кнопка из 2000-х
        const progressBar = document.querySelector('.fill'); // Заливка полоски прогресса
        const videoElement = document.querySelector('video'); // Тег видео (если добавил)

        // 2. Оживляем кнопку Play/Pause
        if (playBtn && videoElement) {
            playBtn.onclick = function() {
                if (videoElement.paused) {
                    videoElement.play();
                    playBtn.innerText = 'Pause';
                    playBtn.style.boxShadow = 'inset 2px 2px 5px #000'; // Эффект нажатия
                } else {
                    videoElement.pause();
                    playBtn.innerText = 'Play';
                    playBtn.style.boxShadow = 'none';
                }
            };
        }

        // 3. Двигаем полоску прогресса (как в настоящем плеере)
        if (videoElement && progressBar) {
            videoElement.ontimeupdate = function() {
                // Вычисляем процент просмотренного видео
                let percentage = (videoElement.currentTime / videoElement.duration) * 100;
                progressBar.style.width = percentage + '%';
            };
        }

        // 4. Пасхалка в стиле 2007-го
        console.log("RuTube 2007 запущен! Привет из эпохи Flash!");
    </script>

</body> <!-- Это самый конец твоего файла -->
</html>
