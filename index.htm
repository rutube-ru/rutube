<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>RuTube.ru :: Всё видео!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="wrapper">
        <!-- Шапка в стиле 2000-х -->
        <header>
            <div class="logo-container">
                <img src="rutube_old_logo.png" alt="RuTube" class="logo">
                <span class="slogan">Всё видео!</span>
            </div>
            <nav>
                <a href="#">Видео</a> | <a href="#">Сообщества</a> | <a href="#">Передачи</a> | <a href="#">Вход</a>
            </nav>
            <div class="search-bar">
                <input type="text" placeholder="Найти видео...">
                <button>Найти!</button>
            </div>
        </header>

        <main>
            <section class="player-section">
                <h1>Название видео из 2008 года</h1>
                <!-- Имитация Flash-плеера -->
                <div id="flash-player-mock">
                    <div class="video-screen">
                        <img src="placeholder.jpg" alt="Video">
                        <div class="play-overlay">▶</div>
                    </div>
                    <div class="controls">
                        <button class="btn">Play</button>
                        <div class="progress-bar"><div class="fill"></div></div>
                        <span class="time">00:00 / 03:45</span>
                    </div>
                </div>
            </section>

            <aside class="sidebar">
                <h3>Похожие видео</h3>
                <div class="thumb">
                    <img src="thumb1.jpg">
                    <p>Приколы с котами 2007</p>
                </div>
            </aside>
        </main>

        <footer>
            <p>&copy; 2006-2009 RuTube. Передаем привет эпохе Flash!</p>
        </footer>
    </div>
<script>
    // Имитация работы старого Flash-плеера
    const playBtn = document.querySelector('.btn');
    const progressBar = document.querySelector('.fill');
    const videoScreen = document.querySelector('.video-screen');
    let isPlaying = false;
    let progress = 0;

    playBtn.onclick = function() {
        if (!isPlaying) {
            isPlaying = true;
            playBtn.innerText = 'Pause';
            startVideo();
        } else {
            isPlaying = false;
            playBtn.innerText = 'Play';
        }
    };

    function startVideo() {
        const interval = setInterval(() => {
            if (!isPlaying) {
                clearInterval(interval);
                return;
            }
            if (progress < 100) {
                progress += 0.5; // Скорость "воспроизведения"
                progressBar.style.width = progress + '%';
            } else {
                progress = 0;
                isPlaying = false;
                playBtn.innerText = 'Play';
                clearInterval(interval);
                alert('Видео просмотрено! Оставь коммент под роликом!');
            }
        }, 100);
    }
</script>

</body>
</html>
