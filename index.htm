<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Иконка сайта -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>RuTube.ru :: Всё видео!</title>
    ...
</head>
<body>
    <div id="wrapper">
        <!-- Шапка в стиле 2000-х -->
        <header>
            <div class="logo-container">
                <img src="rutube_old_logo.png" alt="RuTube" class="logo">
                <span class="slogan">Всё видео!</span>
            </div>
            <nav>
                <a href="#">Видео</a> | <a href="#">Сообщества</a> | <a href="#">Передачи</a> | <a href="#">Вход</a>
            </nav>
            <div class="search-bar">
                <input type="text" placeholder="Найти видео...">
                <button>Найти!</button>
            </div>
        </header>

        <main>
            <section class="player-section">
                <h1>Название видео из 2008 года</h1>
                <!-- Имитация Flash-плеера -->
                <div id="flash-player-mock">
                    <div class="video-screen">
                        <img src="placeholder.jpg" alt="Video">
                        <div class="play-overlay">▶</div>
                    </div>
                    <div class="controls">
                        <button class="btn">Play</button>
                        <div class="progress-bar"><div class="fill"></div></div>
                        <span class="time">00:00 / 03:45</span>
                    </div>
                </div>
            </section>

            <aside class="sidebar">
                <h3>Похожие видео</h3>
                <div class="thumb">
                    <img src="thumb1.jpg">
                    <p>Приколы с котами 2007</p>
                </div>
            </aside>
        </main>

        <footer>
            <p>&copy; 2006-2009 RuTube. Передаем привет эпохе Flash!</p>
        </footer>
    </div>
<!-- Твой HTML код выше (шапка, логотип, плеер) -->

    <script>
        // 1. Находим элементы (кнопки и полоску), которые ты сделал в HTML
        const playBtn = document.querySelector('.btn'); // Твоя кнопка из 2000-х
        const progressBar = document.querySelector('.fill'); // Заливка полоски прогресса
        const videoElement = document.querySelector('video'); // Тег видео (если добавил)

        // 2. Оживляем кнопку Play/Pause
        if (playBtn && videoElement) {
            playBtn.onclick = function() {
                if (videoElement.paused) {
                    videoElement.play();
                    playBtn.innerText = 'Pause';
                    playBtn.style.boxShadow = 'inset 2px 2px 5px #000'; // Эффект нажатия
                } else {
                    videoElement.pause();
                    playBtn.innerText = 'Play';
                    playBtn.style.boxShadow = 'none';
                }
            };
        }

        // 3. Двигаем полоску прогресса (как в настоящем плеере)
        if (videoElement && progressBar) {
            videoElement.ontimeupdate = function() {
                // Вычисляем процент просмотренного видео
                let percentage = (videoElement.currentTime / videoElement.duration) * 100;
                progressBar.style.width = percentage + '%';
            };
        }

        // 4. Пасхалка в стиле 2007-го
        console.log("RuTube 2007 запущен! Привет из эпохи Flash!");
    </script>

</body> <!-- Это самый конец твоего файла -->
</html>
